[package]
name = "salmon"
kind = "tool"
version = "2.3.4"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/salmon"

[command]
name = "taf-salmon"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/salmon:2.3.4-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[meta]
domain = "bio"
categories = ["rna-seq", "transcriptomics", "quantification", "alignment", "indexing"]
keywords = ["salmon", "rna-seq", "transcript abundance", "selective alignment", "sketch", "sshash", "piscem", "quant", "quantmerge"]
description = "Salmon transcript-level RNA-seq quantification with the Salmon 2 Rust CLI, indexing, selective-alignment and sketch quantification, alignment-based quantification, and quantification merging."

[upstream]
name = "Salmon"
type = "github"
repo = "COMBINE-lab/salmon"
homepage = "https://combine-lab.github.io/salmon/"
manual = "https://combine-lab.github.io/salmon/"
release_url = "https://github.com/COMBINE-lab/salmon/releases/tag/v2.3.4"
downloads = "https://github.com/COMBINE-lab/salmon/releases/download/v2.3.4/salmon-cli-x86_64-unknown-linux-gnu.tar.xz; https://github.com/COMBINE-lab/salmon/releases/download/v2.3.4/salmon-cli-aarch64-unknown-linux-gnu.tar.xz"
version = "2.3.4"
commit = "d53fed6f0af6966a40825558f0edf71b6df7cf52"
license = "BSD-3-Clause"
citation = "Patro et al. 2017, Nature Methods"
doi = "10.1038/nmeth.4197"
pmid = "28263959"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 240
exist = ["salmon", "ldd", "locale", "sh"]
test = ["test \"$(salmon --version)\" = 'salmon 2.3.4' && salmon --help 2>&1 | grep -F 'RNA-seq transcript quantification' >/dev/null && ! salmon --help 2>&1 | grep -F '(Rust port)' >/dev/null && ! salmon --help 2>&1 | grep -F 'alevin' >/dev/null && salmon --no-version-check --help 2>&1 | grep -F 'no-op' >/dev/null && ldd $(command -v salmon) | grep -F 'libgcc_s.so' >/dev/null && ldd $(command -v salmon) | grep -F 'libc.so' >/dev/null && ! ldd $(command -v salmon) | grep -F 'not found' >/dev/null", "salmon --no-version-check index --help 2>&1 | grep -F 'Build a salmon index' >/dev/null && salmon --no-version-check index --help 2>&1 | grep -F 'sshashTmpDir' >/dev/null && salmon --no-version-check index --help 2>&1 | grep -F 'ramLimit' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'Quantify transcript abundances' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'writeRad' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'deterministic' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'annotation' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'emAccel' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'squarem' >/dev/null && salmon --no-version-check quant --help 2>&1 | grep -F 'daarem' >/dev/null && salmon --no-version-check quantmerge --help 2>&1 | grep -F 'Merge a column across multiple samples' >/dev/null && salmon --no-version-check debug-map --help 2>&1 | grep -F 'per-read best-mapping detail' >/dev/null", "rm -rf /tmp/taf-salmon-index && mkdir -p /tmp/taf-salmon-index && cd /tmp/taf-salmon-index && printf '>tx1\\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\\n>tx2\\nTTTTGGGGCCCCAAAATTTTGGGGCCCCAAAATTTTGGGG\\n' > transcripts.fa && salmon --no-version-check index -t transcripts.fa -i idx -k 15 -p 1 --quiet >/tmp/taf-salmon-index.log 2>&1 && test -s idx/info.json && test -s idx/index.ssi && test -s idx/index.ctab && grep -F '\"salmon_version\": \"2.3.4\"' idx/info.json >/dev/null && grep -F '\"index_version\": 1' idx/info.json >/dev/null && grep -F '\"num_refs\": 2' idx/info.json >/dev/null", "rm -rf /tmp/taf-salmon-quant && mkdir -p /tmp/taf-salmon-quant && cd /tmp/taf-salmon-quant && printf '>tx1\\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\\n>tx2\\nTTTTGGGGCCCCAAAATTTTGGGGCCCCAAAATTTTGGGG\\n' > transcripts.fa && salmon --no-version-check index -t transcripts.fa -i idx -k 15 -p 1 --quiet >/tmp/taf-salmon-quant-index.log 2>&1 && printf '@r1\\nACGTACGTACGTACGTACGT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n@r2\\nTTTTGGGGCCCCAAAATTTT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n@r3\\nACGTACGTACGTACGTACGT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n' > reads.fq && salmon --no-version-check quant -i idx -l A -r reads.fq -o quant -p 1 --quiet >/tmp/taf-salmon-quant.log 2>&1 && test -s quant/quant.sf && grep -F 'Name' quant/quant.sf >/dev/null && grep -F 'tx1' quant/quant.sf >/dev/null && grep -F 'tx2' quant/quant.sf >/dev/null", "rm -rf /tmp/taf-salmon-sketch && mkdir -p /tmp/taf-salmon-sketch && cd /tmp/taf-salmon-sketch && printf '>tx1\\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\\n>tx2\\nTTTTGGGGCCCCAAAATTTTGGGGCCCCAAAATTTTGGGG\\n' > transcripts.fa && salmon --no-version-check index -t transcripts.fa -i idx -k 15 -p 1 --quiet >/tmp/taf-salmon-sketch-index.log 2>&1 && printf '@r1\\nACGTACGTACGTACGTACGT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n@r2\\nTTTTGGGGCCCCAAAATTTT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n' > reads.fq && salmon --no-version-check quant -i idx -l A -r reads.fq -o sketch_quant -p 1 --sketch --quiet >/tmp/taf-salmon-sketch.log 2>&1 && test -s sketch_quant/quant.sf && grep -F 'tx1' sketch_quant/quant.sf >/dev/null && grep -F 'tx2' sketch_quant/quant.sf >/dev/null", "rm -rf /tmp/taf-salmon-merge && mkdir -p /tmp/taf-salmon-merge/q1 /tmp/taf-salmon-merge/q2 && cd /tmp/taf-salmon-merge && printf 'Name\\tLength\\tEffectiveLength\\tTPM\\tNumReads\\ntx1\\t40\\t2.432\\t100.0\\t2.0\\ntx2\\t40\\t2.432\\t0.0\\t0.0\\n' > q1/quant.sf && printf 'Name\\tLength\\tEffectiveLength\\tTPM\\tNumReads\\ntx1\\t40\\t2.432\\t10.0\\t1.0\\ntx2\\t40\\t2.432\\t90.0\\t9.0\\n' > q2/quant.sf && salmon --no-version-check quantmerge --quants q1 q2 --names s1 s2 --column TPM -o merged.tsv >/tmp/taf-salmon-merge.log 2>&1 && grep -F 'Name' merged.tsv >/dev/null && grep -F 'tx2' merged.tsv >/dev/null && grep -F '90' merged.tsv >/dev/null", "{ salmon --no-version-check alevin > /tmp/taf-salmon-alevin.out 2>&1 && exit 1 || true; } && grep -F 'salmon alevin is not available' /tmp/taf-salmon-alevin.out >/dev/null && grep -F 'alevin-fry' /tmp/taf-salmon-alevin.out >/dev/null", "rm -rf /tmp/taf-salmon-align-se && mkdir -p /tmp/taf-salmon-align-se && cd /tmp/taf-salmon-align-se && printf '@HD\\tVN:1.6\\tSO:unsorted\\n@SQ\\tSN:tx0\\tLN:5000\\nfwd0\\t0\\ttx0\\t2\\t60\\t100M\\t*\\t0\\t0\\t*\\t*\\nrev0\\t16\\ttx0\\t202\\t60\\t100M\\t*\\t0\\t0\\t*\\t*\\n' > se.sam && salmon --no-version-check quant -a se.sam -l U --noErrorModel -o u -p 1 --quiet >/tmp/taf-salmon-align-u.log 2>&1 && salmon --no-version-check quant -a se.sam -l SF --noErrorModel -o sf -p 1 --quiet >/tmp/taf-salmon-align-sf.log 2>&1 && salmon --no-version-check quant -a se.sam -l SR --noErrorModel -o sr -p 1 --quiet >/tmp/taf-salmon-align-sr.log 2>&1 && test -s u/quant.sf && test -s sf/quant.sf && test -s sr/quant.sf && grep -F '\"num_processed\": 2' u/aux_info/meta_info.json >/dev/null && grep -F '\"num_mapped\": 2' u/aux_info/meta_info.json >/dev/null && grep -F '\"num_mapped\": 1' sf/aux_info/meta_info.json >/dev/null && grep -F '\"num_mapped\": 1' sr/aux_info/meta_info.json >/dev/null", "rm -rf /tmp/taf-salmon-accel && mkdir -p /tmp/taf-salmon-accel && cd /tmp/taf-salmon-accel && printf '>tx1\\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\\n>tx2\\nTTTTGGGGCCCCAAAATTTTGGGGCCCCAAAATTTTGGGG\\n' > transcripts.fa && salmon --no-version-check index -t transcripts.fa -i idx -k 15 -p 1 --quiet >/tmp/taf-salmon-accel-index.log 2>&1 && printf '@r1\\nACGTACGTACGTACGTACGT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n@r2\\nTTTTGGGGCCCCAAAATTTT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n@r3\\nACGTACGTACGTACGTACGT\\n+\\nFFFFFFFFFFFFFFFFFFFF\\n' > reads.fq && salmon --no-version-check quant -i idx -l A -r reads.fq -o squarem -p 1 --emAccel squarem --quiet >/tmp/taf-salmon-squarem.log 2>&1 && salmon --no-version-check quant -i idx -l A -r reads.fq -o daarem -p 1 --emAccel daarem --quiet >/tmp/taf-salmon-daarem.log 2>&1 && test -s squarem/quant.sf && test -s daarem/quant.sf && grep -F 'tx1' squarem/quant.sf >/dev/null && grep -F 'tx2' daarem/quant.sf >/dev/null"]
